<script>
  const pubs = [
    "FOREST TAVERN",
    "HOLLY TREE",
    "PRETTY DECENT TAP ROOM",
    "THE BOLEYN TAVERN",
  ];

  const startDate = new Date("2026-06-06");
  const sixWeeksMs = 6 * 7 * 24 * 60 * 60 * 1000;

  function getNextPubInfo() {
    var now = new Date();
    var diff = now - startDate;

    if (diff < 0) {
      return { date: startDate, pubIndex: 0 };
    }

    var intervalsPassed = Math.floor(diff / sixWeeksMs);

    // If we're on drinks night (8pm to midnight), stay on this event
    var currentIntervalDate = new Date(startDate.getTime() + intervalsPassed * sixWeeksMs);
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var eventDay = new Date(currentIntervalDate.getFullYear(), currentIntervalDate.getMonth(), currentIntervalDate.getDate());

    if (today.getTime() === eventDay.getTime() && now.getHours() >= 20) {
      return { date: currentIntervalDate, pubIndex: intervalsPassed % pubs.length };
    }

    var nextInterval = intervalsPassed + 1;
    var nextDate = new Date(startDate.getTime() + nextInterval * sixWeeksMs);
    var pubIndex = nextInterval % pubs.length;

    return { date: nextDate, pubIndex: pubIndex };
  }

  var pubInfo = getNextPubInfo();
  var end = new Date(pubInfo.date);
  end.setHours(20, 0, 0, 0);

  var _millisecond = 1;
  var _second = _millisecond * 1000;
  var _minute = _second * 60;
  var _hour = _minute * 60;
  var _day = _hour * 24;
  var timer;

  function showRemaining() {
    var now = new Date();
    var distance = end - now;
    if (distance < 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerHTML = "DRINKS HAVE STARTED!!!";

      return;
    }
    var days = Math.floor(distance / _day);
    var hours = Math.floor((distance % _day) / _hour);
    var minutes = Math.floor((distance % _hour) / _minute);
    var seconds = Math.floor((distance % _minute) / _second);
    var milliseconds = Math.floor((distance % _second) / _millisecond);

    document.getElementById("countdown").innerHTML = days + " days ";
    document.getElementById("countdown").innerHTML += hours + "hrs ";
    document.getElementById("countdown").innerHTML += minutes + "mins ";
    document.getElementById("countdown").innerHTML += seconds + "secs ";
    document.getElementById("date").innerHTML =
      "or " + end.toLocaleString() + " for those who don't math";
  }

  setInterval(() => {
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);
    const randomRgb = "rgb(" + r + "," + g + "," + b + ")";

    document.body.style.backgroundColor = randomRgb;
  }, 500);
  showRemaining();
  timer = setInterval(showRemaining, 1000);
